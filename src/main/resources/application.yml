server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/focus_trainer?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  redis:
    host: localhost
    port: 6379
    database: 0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.focuskids.trainer.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: ${JWT_SECRET:FkTr2026#Sec!K3y$F0cusKidsApp}
  expiration: 604800000  # 7天(毫秒)
  header: Authorization
  prefix: Bearer

# 训练配置
training:
  min-duration: 300     # 最小训练时长5分钟(秒)
  max-duration: 1800    # 最大训练时长30分钟(秒)
  interrupt-threshold: 3  # 中断次数阈值
  star-per-minute: 2      # 每分钟获得星星数

# 文件上传配置
file:
  upload-path: ./uploads/
  max-size: 10MB
